name: Security & Quality

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  fmt_clippy:
    name: Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy rustfmt
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test all targets and features
        run: cargo test --all-targets --all-features

  zk_soroban:
    name: ZK Soroban Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy rustfmt
      - name: Format nested Soroban workspace
        run: cargo fmt --manifest-path hackathons/stellar-real-world-zk/soroban/Cargo.toml --check
      - name: Clippy nested Soroban workspace
        run: cargo clippy --manifest-path hackathons/stellar-real-world-zk/soroban/Cargo.toml --all-targets -- -D warnings
      - name: Test contract and genuine Groth16 fixtures
        run: cargo test --manifest-path hackathons/stellar-real-world-zk/soroban/Cargo.toml

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: |
          # Known transitive warnings are scoped and documented in docs/security.md.
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0186
